<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Football For Good Battle</title>

<style>
*{
box-sizing:border-box;
font-family:Arial,"Sarabun",sans-serif;
}

body{
margin:0;
background:#f7f8fa;
color:#111;
}

.container{
max-width:600px;
margin:auto;
padding:24px;
}

.header{
text-align:center;
margin-bottom:30px;
}

.header h1{
font-size:28px;
margin-bottom:8px;
}

.header p{
color:#666;
}


.match-card{
background:white;
border-radius:24px;
padding:24px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}


.teams{
display:flex;
justify-content:space-between;
align-items:center;
text-align:center;
}

.team{
width:40%;
}

.flag{
font-size:50px;
}

.team h2{
font-size:20px;
}


.vs{
font-weight:bold;
color:#999;
}


.countdown{
background:#111;
color:white;
padding:14px;
border-radius:15px;
text-align:center;
margin:25px 0;
}


.battle-title{
text-align:center;
font-weight:bold;
margin-bottom:12px;
}


.bar{
height:35px;
background:#eee;
border-radius:30px;
overflow:hidden;
display:flex;
}

.left{
width:50%;
background:#1d4ed8;
}

.right{
width:50%;
background:#ef4444;
}


.money{
display:flex;
justify-content:space-between;
margin-top:15px;
font-size:18px;
}


.buttons{
display:flex;
gap:10px;
margin-top:25px;
}


button{
flex:1;
border:none;
padding:14px;
border-radius:15px;
font-size:15px;
cursor:pointer;
background:#111;
color:white;
}


.info{
margin-top:25px;
background:#f1f5f9;
padding:18px;
border-radius:18px;
font-size:14px;
color:#555;
}

</style>

</head>


<body>

<div class="container">


<div class="header">
<h1>⚽ Football For Good</h1>
<p>เชียร์ทีมโปรด เปลี่ยนพลังแฟนบอลเป็นโอกาสทางการศึกษา</p>
</div>


<div class="match-card">


<div class="teams">

<div class="team">
<div class="flag">🇦🇷</div>
<h2>Argentina</h2>
</div>


<div class="vs">
VS
</div>


<div class="team">
<div class="flag">🇪🇸</div>
<h2>Spain</h2>
</div>

</div>



<div class="countdown">
⏳ เริ่มแข่งใน 02 วัน 05 ชั่วโมง
</div>


<div class="battle-title">
❤️ Fan Battle
</div>


<div class="bar">
<div class="left"></div>
<div class="right"></div>
</div>


<div class="money">

<div>
🇦🇷<br>
0 บาท
</div>


<div style="text-align:right">
🇪🇸<br>
0 บาท
</div>

</div>



<div class="buttons">

<button onclick="team1()">
เชียร์ Argentina
</button>

<button onclick="team2()">
เชียร์ Spain
</button>

</div>


<div class="info">
เงินสนับสนุนทั้งหมดส่งผ่านแพลตฟอร์มเทใจโดยตรง
เว็บไซต์นี้เป็นพื้นที่รวมพลังแฟนบอล
</div>


</div>

</div>


<script>

function team1(){
window.open("ทีม Argentina","https://taejai.com/th/project/chd-dream-musical-car");
}


function team2(){
window.open("ทีม Spain","https://taejai.com/th/project/chd-Hiring-administrative-staff-to-return-teachers-to-the-classroom/?utm_source=taejai&utm_medium=project-share&utm_campaign=chd-Hiring-administrative-staff-to-return-teachers-to-the-classroom");
}

</script>


</body>
</html>
